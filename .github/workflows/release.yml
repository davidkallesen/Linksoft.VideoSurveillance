name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp (e.g. 1.0.7 or 1.0.7-rc1). Required for manual runs.'
        required: true
        type: string
      publish_release:
        description: 'Create a GitHub Release with the MSIs attached (off = build & artifacts only).'
        required: false
        default: false
        type: boolean
      publish_nuget:
        description: 'Push the CameraWall NuGet package to NuGet.org.'
        required: false
        default: false
        type: boolean

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test --no-build --configuration ${{ env.CONFIGURATION }}

  publish-nuget:
    name: Publish NuGet Package
    runs-on: windows-latest
    needs: build-and-test
    if: github.event_name == 'push' || inputs.publish_nuget

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/Linksoft.CameraWall.Wpf/Linksoft.CameraWall.Wpf.csproj

      - name: Pack NuGet
        run: dotnet pack src/Linksoft.CameraWall.Wpf/Linksoft.CameraWall.Wpf.csproj --configuration ${{ env.CONFIGURATION }} --no-restore --output ./nuget -p:IsPackable=true

      - name: Push to NuGet.org
        run: |
          $packages = Get-ChildItem ./nuget -Filter *.nupkg
          if ($packages.Count -eq 0) { throw "No .nupkg files found in ./nuget" }
          foreach ($pkg in $packages) {
            Write-Host "Pushing $($pkg.Name)"
            dotnet nuget push $pkg.FullName --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          }

  build-installer:
    name: Build MSI Installer
    runs-on: windows-latest
    needs: build-and-test
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get Version
        id: version
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          } else {
            $tag = '${{ github.ref_name }}'
            $version = $tag -replace '^v', ''
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Publish Application
        run: dotnet publish src/Linksoft.CameraWall.Wpf.App/Linksoft.CameraWall.Wpf.App.csproj --configuration ${{ env.CONFIGURATION }} --output ./publish -p:Version=${{ steps.version.outputs.version }}

      - name: Download FFmpeg
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-8.0.1-full_build-shared.7z"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile ffmpeg.7z
          7z x ffmpeg.7z -offmpeg-temp
          $binDir = Get-ChildItem -Path ffmpeg-temp -Recurse -Directory -Filter "bin" | Select-Object -First 1
          New-Item -ItemType Directory -Path "./publish/ffmpeg" -Force
          Copy-Item "$($binDir.FullName)\*.dll" -Destination "./publish/ffmpeg/"

      - name: Build Installer
        run: dotnet build setup/Linksoft.CameraWall.Installer/Linksoft.CameraWall.Installer.wixproj --configuration ${{ env.CONFIGURATION }} -p:ProductVersion=${{ steps.version.outputs.version }}

      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer-camerawall
          path: setup/Linksoft.CameraWall.Installer/bin/${{ env.CONFIGURATION }}/*.msi
          retention-days: 5

  build-installer-videosurveillance:
    name: Build VideoSurveillance MSI Installer
    runs-on: windows-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Get Version
        id: version
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          } else {
            $tag = '${{ github.ref_name }}'
            $version = $tag -replace '^v', ''
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Publish Application
        run: dotnet publish src/Linksoft.VideoSurveillance.Wpf.App/Linksoft.VideoSurveillance.Wpf.App.csproj --configuration ${{ env.CONFIGURATION }} --output ./publish-vs -p:Version=${{ steps.version.outputs.version }}

      - name: Download FFmpeg
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-8.0.1-full_build-shared.7z"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile ffmpeg.7z
          7z x ffmpeg.7z -offmpeg-temp
          $binDir = Get-ChildItem -Path ffmpeg-temp -Recurse -Directory -Filter "bin" | Select-Object -First 1
          New-Item -ItemType Directory -Path "./publish-vs/ffmpeg" -Force
          Copy-Item "$($binDir.FullName)\*.dll" -Destination "./publish-vs/ffmpeg/"

      - name: Build Installer
        run: dotnet build setup/Linksoft.VideoSurveillance.Installer/Linksoft.VideoSurveillance.Installer.wixproj --configuration ${{ env.CONFIGURATION }} -p:ProductVersion=${{ steps.version.outputs.version }} -p:PublishDir=${{ github.workspace }}/publish-vs

      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer-videosurveillance
          path: setup/Linksoft.VideoSurveillance.Installer/bin/${{ env.CONFIGURATION }}/*.msi
          retention-days: 5

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-installer, build-installer-videosurveillance]
    if: github.event_name == 'push' || inputs.publish_release
    permissions:
      contents: write

    steps:
      - name: Download CameraWall MSI Artifact
        uses: actions/download-artifact@v4
        with:
          name: msi-installer-camerawall
          path: ./msi

      - name: Download VideoSurveillance MSI Artifact
        uses: actions/download-artifact@v4
        with:
          name: msi-installer-videosurveillance
          path: ./msi

      - name: Resolve Tag Name
        id: tagname
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=$( [[ '${{ inputs.version }}' == *-* ]] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=$( [[ '${{ github.ref_name }}' == *-* ]] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tagname.outputs.tag }}
          name: Release ${{ steps.tagname.outputs.tag }}
          draft: false
          prerelease: ${{ steps.tagname.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: ./msi/*.msi
